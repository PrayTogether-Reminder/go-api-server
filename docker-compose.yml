version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: praytogether-db
    environment:
      POSTGRES_DB: praytogether
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: praytogether-api
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: praytogether
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      GIN_MODE: ${GIN_MODE:-debug}
    volumes:
      - ./:/app
    command: ./main

volumes:
  postgres_data: